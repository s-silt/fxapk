name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # ★PII 硬防线：语料库/案件数据只能经 FXAPK_CORPUS 存在 OneDrive，绝不入 git。真正的 PII 载荷是
      #   报告全文 reports/<sha>/<tv>_<digest>.report.json（含真实 IOC/案件线索），不止派生索引
      #   manifest.jsonl / ioc_index.jsonl——三者任一被跟踪即视为误提交、CI 红。
      - name: Guard — no corpus/case data committed
        run: |
          if git ls-files | grep -E '(^|/)(manifest\.jsonl|ioc_index\.jsonl)$|\.report\.json$'; then
            echo "::error::corpus/case data (*.report.json / manifest.jsonl / ioc_index.jsonl) must never be committed — it belongs in OneDrive via FXAPK_CORPUS"
            exit 1
          fi
          echo "no corpus data files tracked — OK"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps + linters
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[graph,track]"
          python -m pip install ruff pyright
      - name: Ruff (lint)
        run: python -m ruff check apkscan tests
      - name: Pyright (type check)
        run: python -m pyright apkscan

  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux 跑全 Python 版本；macOS / Windows 各跑一版验跨平台（路径/编码/换行等平台差异）。
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[graph,track]"
          python -m pip install pytest pytest-cov
      # 覆盖率门禁只在 Linux 跑（基线 83%，阈值 80 留 3% 余量）。macOS/Windows 覆盖到的行不同
      # （平台分支），共用一个阈值会假红；那两个 job 只验跨平台正确性，不做覆盖率门禁。
      - name: Run tests + coverage gate (Linux)
        if: runner.os == 'Linux'
        run: >-
          python -m pytest -q
          --cov=apkscan --cov-report=term-missing:skip-covered --cov-fail-under=80
      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m pytest -q

  package-smoke:
    name: package smoke (wheel install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install built wheel in a clean venv and smoke-test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --upgrade pip
          /tmp/smoke/bin/python -m pip install dist/*.whl
          # 入口 console_script 装包后可用。
          /tmp/smoke/bin/fxapk --version
          # ★关键：rules/*.yaml 等 package-data 真打进 wheel 且可被 importlib.resources 读到。
          #   纯源码测试跑不出这类“忘打数据文件 → pip 装完加载不了规则”的发布事故。
          /tmp/smoke/bin/python -c "from apkscan.core.registry import load_rules; assert all(load_rules(n) for n in ('packers','re_toolkit','app_types')), 'packaged rules missing from wheel'; print('packaged rules load OK')"

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      # 审计**仅 fxapk 的依赖树**：把 fxapk[graph,track] 装进隔离 venv，不含 pip-audit 自身及其
      # 依赖 / CI 工具——否则那些无关上游漏洞会让审计误红（pip-audit 的传递依赖爆 CVE 与本项目无关）。
      - name: Install fxapk deps into an isolated venv
        run: |
          python -m venv /tmp/auditenv
          /tmp/auditenv/bin/python -m pip install --upgrade pip
          /tmp/auditenv/bin/python -m pip install ".[graph,track]"
      # pip-audit 装在 runner python（与被审 venv 隔离），--path 只审那个 venv 的 site-packages。
      # 当前干净 → 阻断式门禁，只在**新**漏洞出现时变红；某上游漏洞暂无修复版时用 `--ignore-vuln <ID>`
      # 显式豁免。不加 --strict：非 PyPI 的本地 fxapk 包会被跳过、--strict 会因此误红。
      - name: Audit only the fxapk dependency tree
        run: |
          python -m pip install --upgrade pip pip-audit
          # sysconfig purelib = 真正的 site-packages（跨平台可靠；site.getsitepackages()[0] 在不同
          # 平台可能是 venv 根，会让 --path 审到空目录、"无漏洞"假绿）。
          SITE=$(/tmp/auditenv/bin/python -c "import sysconfig; print(sysconfig.get_path('purelib'))")
          echo "auditing: $SITE"
          test -d "$SITE" || { echo "site-packages 路径无效：$SITE"; exit 1; }
          python -m pip_audit --path "$SITE"
