      - "com.chaosvmp."
    note: "娜迦（爱加密底层 VMP 提供方之一）以 libchaosvmp/libddog/libfdog/libgdog.so 为典型特征。"

  # ---- 百度加固（Baidu Protect）----------------------------------------
  - name: "百度加固 (Baidu Protect)"
    vendor: "百度（北京百度网讯科技有限公司 / 百度加固）"
    so_names:
