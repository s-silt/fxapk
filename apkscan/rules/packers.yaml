  # ---- 阿里聚安全 / 阿里云移动安全（Alibaba Jaq / Mobile Security）------
  - name: "阿里聚安全 (Alibaba JAQ / 阿里云移动安全)"
    vendor: "阿里巴巴（阿里云计算有限公司 / 阿里聚安全·移动安全）"
