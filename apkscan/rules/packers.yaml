    vendor: "梆梆安全（北京梆梆安全科技有限公司）"
    so_names:
      - "libDexHelper.so"
      - "libDexHelper-x86.so"
      - "libsecexe.so"
      - "libsecmain.so"
      - "libSecShell.so"
      - "libSecShell-x86.so"
    files:
      - "assets/secData0.jar"
      - "assets/secData"
      - "secData0.jar"
      - "assets/bangcle_classes.jar"
      - "assets/bangcleplugin"
    dex_prefixes:
      - "com.secneo."
      - "com.bangcle."
      - "cn.com.chinatelecom.account"
    note: "梆梆为国内最早商用加固厂商之一，libDexHelper/libsecexe + secData 为其典型特征。"

