# 技术栈 / 后台框架指纹规则（串案用）。
#
# ★ 定位与边界（务必守住）：本库是**取证串案情报**，不是攻击工具。
#   - 只描述「哪种被动 banner 指纹 = 是什么技术栈 / 后台框架」，用于**同后台 = 疑同团伙**并簇串案。
#   - **只识别、不研判漏洞、不给利用方向**；绝不含 exploit / PoC / 利用代码 / 注入串 / webshell / 具体命令。
#
# 指纹字段（对齐被动 enrichers 真实输出，小写子串匹配，任一命中即该条命中）：
#   server / x_powered_by / title  ← 服务 banner 的 Server / X-Powered-By / <title>
#   cookie                         ← Set-Cookie 名（离散 token，精确匹配）
#   product / cpe / module         ← shodan.services[]（被动，对目标零流量）

# -------------------------------------------------------------------------
# 技术栈 / 后台框架指纹（仅识别 → 同后台串案；不含漏洞方向、不含利用靶单）
# -------------------------------------------------------------------------
tech_stack:
  - name: "PHP"
    server: ["php"]
    x_powered_by: ["php"]
    cookie: ["phpsessid"]
    product: ["php"]
    cpe: ["cpe:/a:php:php", "cpe:2.3:a:php:php"]
    note: "后端为 PHP 语言栈（后续 PHP 框架 / 面板研判的前置锚点）"

  - name: "ThinkPHP"
    server: ["thinkphp"]
    x_powered_by: ["thinkphp"]
    product: ["thinkphp"]
    title: ["thinkphp"]
    cpe: ["cpe:2.3:a:thinkphp:thinkphp"]
    note: "ThinkPHP 框架（涉诈 / 赌博后台高发）；★ 同后台疑同团伙基础设施，建议并簇串案"

  - name: "Laravel"
    cookie: ["laravel_session", "xsrf-token"]
    x_powered_by: ["laravel"]
    title: ["laravel"]
    note: "Laravel 框架；★ 同后台疑同团伙基础设施，建议并簇串案"

