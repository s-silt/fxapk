# 后端 / 管理凭据识别（从已扣押 APK 静态提取——取证分析，非主动攻击）。
#
# 诈骗 App 常把后台 / 数据库 / 云凭据硬编码进包；提取它们 = 对证物做取证分析，供**有权机关
# 依法**登录后台/数据库/云控制台取证、或据归属向云厂商调服务器镜像与日志。**严禁未授权使用。**
# 这是"弱口令/已知凭据"的合规版本：不去猜/不主动爆破远程服务器，只抠 App 自己带着的凭据。
#
# 全部高精度结构化形态（误报近零）；正则一律字符类 + 有界量词，无灾难性回溯。
# decode: base64_userpass —— 分析器对捕获组 base64 解码、要求解出 user:pass（含冒号、可打印）。

where_to_request: 无直接调证对象（凭据供有权机关依法登录取证 / 据服务器归属向云厂商调镜像与日志）

evidence_to_obtain:
  - 凭该后端 / 管理凭据，由有权机关依法登录后台 / 数据库 / 云控制台取证
  - 据凭据指向的服务器归属，向云厂商 / IDC 调取服务器镜像 / 磁盘与访问日志

patterns:
  - id: BASIC-AUTH
    title: HTTP Basic 认证凭据（硬编码）
    decode: base64_userpass
    regex: 'Authorization:\s{0,4}Basic\s{1,4}([A-Za-z0-9+/]{8,1024}={0,2})'

  - id: DB-DSN
    title: 数据库连接串（含账号口令）
    regex: '(?:mysql|mariadb|postgresql|postgres|mongodb\+srv|mongodb|redis|amqp|sqlserver)://[^\s:@/]{1,128}:[^\s:@/]{1,128}@[^\s/]{1,255}'

  - id: JDBC-PWD
    title: JDBC 连接串（含 password）
    regex: 'jdbc:[a-z0-9]{1,16}://[^\s]{1,255}[?&]password=[^\s&]{1,128}'

  - id: AWS-AK
    title: AWS AccessKey（硬编码）
    regex: '(?<![A-Za-z0-9])AKIA[0-9A-Z]{16}(?![A-Za-z0-9])'

  - id: ALIYUN-AK
    title: 阿里云 AccessKey（硬编码）
    regex: '(?<![A-Za-z0-9])LTAI[A-Za-z0-9]{12,22}(?![A-Za-z0-9])'
