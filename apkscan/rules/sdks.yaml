# 第三方服务 / SDK 指纹库 — 国内主流厂商特征 → 调证主体映射（覆盖中文涉诈场景）。
#
# 由 apkscan.analyzers.sdk_fingerprint 通过 registry.load_rules("sdks") 读取。
# 顶层为 dict，含两个键：
#   sdks : list[规则]，每条第三方 SDK / 云服务一条
#   meta : 全局兜底文案（命中后写入 Lead 的字段，单条规则可覆盖）
#
# ★ 核心价值：每个 SDK 绑定一家可调证公司 —— 命中即产 Lead(category=SDK_SERVICE)，
#   把 SDK 厂商作为调证目标（持有开发者实名、appid/appkey 注册主体、调用/下发日志）。
#
# 每条 sdk 规则字段：
#   name              : SDK / 服务展示名
#   vendor            : 厂商公司全称（= 调证对象，写入 Lead.subject / where_to_request）
#   category          : SDK 分类（payment/sms/push/storage/im/analytics/map 等，仅用于分组/notes）
#   dex_prefixes      : DEX 类名包前缀 / 字符串特征（匹配 ctx.dex_strings()，子串比较，大小写敏感）
#   so_names          : .so 库名特征（匹配 ctx.native_libs()+list_files() 的 basename，大小写不敏感）
#   files             : 资源 / assets 特征文件（路径子串，匹配 ctx.list_files()，大小写不敏感）
#   evidence_to_obtain: 可向厂商调取的证据（写入 Lead.evidence_to_obtain；缺省用 meta 兜底）
#   note              : 补充说明（写入 Lead.notes）
#
# 置信度规则（由分析器按命中强度判定，非 YAML 字段）：
#   命中 so / 资源文件，或命中 >=2 类特征  → HIGH
#   仅命中单一 dex 类前缀特征             → MEDIUM

meta:
  # 命中后 Lead 默认可调取证据（单条 sdk 可用 evidence_to_obtain 覆盖）。
  evidence_to_obtain:
    - "开发者账号实名信息（注册主体/联系人/手机号/邮箱）"
    - "应用绑定的 appid / appkey / 商户号注册主体"
    - "服务调用日志（调用 IP / 时间 / 频次）"
  where_to_request_suffix: ""

