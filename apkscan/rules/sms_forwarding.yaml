# 短信 / 验证码转发服务识别规则（apkscan.analyzers.sms_forwarding 消费）。
#
# OTP（短信验证码）转发是接管受害人账户的关键基础设施：在受害人设备上拦截 SMS_RECEIVED
# 广播、抽取验证码，再上传 / 转发到团伙接收端（Telegram bot / webhook / 接收手机号）。
# 命中即资金被划走前的最后一道闸，recon 阶段标 HIGH。当前覆盖 Telegram bot / webhook 模式。
#
# 三类强证据（tier: high → HIGH·建议调证）+ 一类弱证据（tier: review → MEDIUM·待核）：
#   - keyword_patterns：中文转发关键词（短信转发 / 验证码转发 / 拦截短信 / 转发到…）。
#   - combo_patterns：短信接收 + 上传/转发组合（dex 方法 token 词边界匹配，两组都命中才 high）。
#   - webhook_host_regex / webhook_path_regex：forward webhook 目标指纹（Telegram bot sendMessage 等）。
#
# 正则一律字符类 / 定长替换，无嵌套量词、无 alternation 外包无界量词 → 线性、无灾难性回溯。
# 已知正规短信"发送"SDK（阿里云 dysms / 腾讯云 / Twilio / 容联云 / Mob 等）作为发送方的合法
# 用法由 sender_sdk_whitelist + 分析器侧 FP 收敛排除；webhook 目标 host 经 infra.classify_domain
# 排除已知第三方基础设施。

where_to_request: 短信转发平台 / 接收手机号归属运营商 / 转发目标平台

evidence_to_obtain:
  - 转发目标（接收手机号 / Telegram 账号 / chat_id / webhook URL）及其归属与实名
  - 短信接收与转发记录（拦截到的验证码内容、转发时间、目标）
  - 转发平台 / Telegram bot 注册账号实名（手机号 / 邮箱 / 支付绑定）
  - 接收验证码的手机卡（接收卡）开卡实名与归属运营商

# 正规短信"发送"SDK 标识：仅命中这些且无任何强转发/接收信号时，FP 收敛不出线索
# （区分"业务发短信"与"接收并转发上传"的窃取模式）。
sender_sdk_whitelist:
  - "dysmsapi"          # 阿里云短信
  - "aliyun.sms"
  - "sms.tencentcloudapi.com"  # 腾讯云短信
  - "sms.tencent"
  - "twilio"            # Twilio
  - "ronglian"          # 容联云
  - "yuntongxun"        # 容联云通讯能力
  - "submail"           # SUBMAIL 赛邮
  - "montnets"          # 梦网短信
  - "com.mob.SMSSDK"    # Mob 短信验证 SDK
  - "cn.smssdk"

# forward webhook 目标指纹（Telegram Bot API：api.telegram.org/bot<token>/sendMessage）。
# host 段为定长字符类（无回溯）。
webhook_host_regex: '(^|\.)(telegram|telegra|tlgr)\.(org|me|im)$'
# path 段：/bot<token>/sendMessage 或通用 forward/notify webhook 路径（有界量词、无嵌套）。
webhook_path_regex: '/bot[0-9A-Za-z:_-]{1,80}/(sendMessage|sendmessage|forwardMessage)'

keyword_patterns:
  - id: SMSF-KW-FORWARD
    title: 短信 / 验证码转发关键词
    tier: high
    keywords:
      - "短信转发"
      - "验证码转发"
      - "转发短信"
      - "转发验证码"
      - "拦截短信"
      - "短信拦截"
      - "拦截验证码"
      - "monitor sms"
      - "forward sms"
      - "sms forward"
      - "otp forward"

  - id: SMSF-KW-FORWARD-TARGET
    title: 短信转发目标配置关键词
    tier: high
    keywords:
      - "转发到"
      - "转发目标"
      - "forward_to"
      - "forward_url"
      - "forward_webhook"
      - "sms_webhook"

  - id: SMSF-KW-WEAK
    title: 短信处理关键词（弱信号）
    tier: review
    keywords:
      - "短信内容"
      - "读取短信"
      - "sms body"
      - "message body"

combo_patterns:
  # 短信接收（SMS_RECEIVED 广播 / PDU 解析 / 取正文）+ **强指向转发窃取**的证据共现 → 强证据。
  # 对抗收敛：forward_tokens 不再含 okhttp3 / HttpURLConnection / 裸 sendMessage 等
  # 「几乎所有联网 App 都有」的通用网络库 token——否则「验证码自动填充(接收) + 普通 okhttp」
  # 即被误判 HIGH。只保留强指向转发/窃取落点的指纹（Telegram bot / forward webhook / 转发关键词）。
  # 仅「接收 + 通用 HTTP」由分析器降级为弱档（待核或不出），不在此处升 HIGH。
  - id: SMSF-COMBO-RECV-FORWARD
    title: 接收短信广播 + 上传/转发组合
    receive_tokens:
      - "android.provider.Telephony.SMS_RECEIVED"
      - "SMS_RECEIVED"
      - "createFromPdu"
      - "getMessageBody"
      - "getDisplayMessageBody"
      - "getOriginatingAddress"
    forward_tokens:
      - "api.telegram.org"   # Telegram bot 转发落点
      - "/bot"               # Telegram bot API path 片段
      - "sendMessage"        # Telegram bot 上报方法（与 telegram 同族指纹）
      - "forward_url"        # 转发目标配置
      - "forward_webhook"    # 转发 webhook 配置
      - "sms_webhook"        # 短信 webhook 转发配置
      - "转发到"             # 中文转发目标
      - "转发目标"
