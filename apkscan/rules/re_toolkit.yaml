# 逆向 / Hook / 反检测工具链指纹库 —— 识别样本内置的 RE/hook/反分析能力。
#
# 由 apkscan.analyzers.re_toolkit 通过 registry.load_rules("re_toolkit") 读取。
# 顶层为 dict，含两个键：
#   tools : list[规则]，每个工具/框架一条
#   meta  : 全局兜底文案
#
# ★ 定位与边界：本库是**防御性威胁情报**——识别样本内置了哪些 hook/反检测工具，
#   用于研判「疑运行时劫持能力」并预判「fxapk 动态抓包是否会被反检测击败」，
#   以及作为团伙工具链指纹并簇串案。**只识别、不利用**，绝不含任何攻击/利用代码。
#
# 每条 tool 规则字段：
#   name         : 工具/框架展示名
#   category     : hook_framework（运行时 hook 能力） | evasion（反检测/反分析） | instrumentation（插桩/注入）
#   capability   : 该工具赋予样本的能力（人读，写入 Finding/notes）
#   so_names     : .so 库名特征（匹配 native_libs()+list_files() 的 basename，大小写不敏感）→ 强证据
#   files        : 资源/assets 特征路径子串（匹配 list_files()，大小写不敏感）→ 强证据
#   dex_prefixes : DEX 类名包前缀/字符串特征（匹配 dex_strings()，子串比较）→ 中证据
#   anti_frida   : true 表示该工具会**主动击败/规避 frida** → 触发 capture_plan 反 frida 告警（默认 false）
#   note         : 补充说明（写入 Finding.notes）
#
# 置信度（分析器实现）：so/files 命中 = 强；仅 dex 包名命中 = 中。任一命中即产 Finding。

meta:
  reference: "https://developer.android.com/topic/security"

tools:
  # ======================================================================
  # Hook 框架 —— 内置即具备运行时 hook 能力（结合无障碍权限 → 疑劫持银行/支付、无障碍远控）
  # ======================================================================
  - name: "ShadowHook (字节 Android inline hook)"
    category: "hook_framework"
    capability: "native inline hook（thumb/arm32/arm64）"
    so_names:
      - "libshadowhook.so"
      - "libshadowhook_nothing.so"
    dex_prefixes:
      - "com.bytedance.shadowhook"
    note: "字节开源 native inline hook；样本内置 = 具备原生层函数劫持能力，★ 结合无障碍/辅助功能权限疑运行时劫持。"

  - name: "ByteHook (字节 PLT hook)"
    category: "hook_framework"
    capability: "native PLT/GOT hook"
    so_names:
      - "libbytehook.so"
    dex_prefixes:
      - "com.bytedance.android.bytehook"
    note: "字节开源 PLT hook（bhook）；样本内置 = 具备原生层函数劫持能力。"

  - name: "GlossHook (native hook)"
    category: "hook_framework"
    capability: "native inline/PLT/GOT hook"
    so_names:
      - "libGlossHook.so"
    note: "开源 native hook 库；样本内置 = 具备原生层函数劫持能力。"

  - name: "LSPlant (ART hook)"
    category: "hook_framework"
    capability: "ART Java 方法 hook（LSPosed 系）"
    so_names:
      - "liblsplant.so"
    dex_prefixes:
      - "org.lsposed.lsplant"
    note: "LSPosed 系 ART 方法 hook 框架；样本内置 = 具备 Java 层方法劫持能力。"

  - name: "pine (ART hook)"
    category: "hook_framework"
    capability: "ART Java 方法 hook（免 Xposed）"
    dex_prefixes:
      - "top.canyie.pine"
    note: "免 Xposed 的 ART 方法 hook 框架；样本内置 = 具备 Java 层方法劫持能力。"

  - name: "ArtHook (ART 方法级 hook)"
    category: "hook_framework"
    capability: "ArtMethod 级 Java 方法 hook（静态库编入宿主 .so，无独立 so/dex）"
    so_strings:
      - "_ZN7arthook"
    note: "ArtHook 以静态库编入 App 自有 .so、无独立 libarthook.so、无 Java 包名，三路(so名/文件/dex)全落空，靠 .so 内 mangled C++ 符号 _ZN7arthook（namespace arthook 长度前缀 7）识别；release 完全 strip 符号则静态无痕，须靠运行时兜底。"

  - name: "xDL (Android ELF 符号解析)"
    category: "hook_framework"
    capability: "绕过 linker namespace 解析 .so 符号（hook 前置能力）"
    so_names:
      - "libxdl.so"
    note: "增强版 dlopen/dlsym，绕过 Android 7+ linker namespace 限制解析导出/导入符号；hook 框架常用前置。"

  - name: "Dobby (inline hook 后端)"
    category: "hook_framework"
    capability: "native inline hook 后端引擎"
    so_names:
      - "libdobby.so"
    note: "常见 native inline hook 引擎；样本内置 = 具备原生层函数劫持能力。"

  - name: "Android-Mem-Kit (内存插桩)"
    category: "hook_framework"
    capability: "native 内存补丁/函数 hook/符号解析（含 IL2CPP 符号解析）"
    so_names:
      - "libmemkit.so"
    note: "内存补丁/hook/符号解析工具；依赖 shadowhook 兼容层，需结合 ShadowHook 条目综合研判（同时命中 libmemkit.so 才计本条目，避免与纯 ShadowHook 样本重复计数）。"

  # ======================================================================
  # 反检测 / 反分析 —— 内置即可能击败 fxapk 的 frida 动态抓包
  # ======================================================================
  - name: "LibcoreSyscall (纯 Java 直 syscall)"
    category: "evasion"
    capability: "纯 Java 直接 Linux syscall + 内存加载 ELF（绕过 libc/Java hook 层）"
    dex_prefixes:
      - "dev.tmpfs.libcoresyscall"
    anti_frida: true
    note: "★ 直接 syscall 绕过 libc/Java hook 层，fxapk 的 frida hook 可能静默失效（抓不到≠没有）；内存加载 ELF 无落盘。检测到即应换打法（旁路 pcap / tls-keylog / 内核层）。"

  - name: "AndroidHiddenApiBypass (LSPass)"
    category: "evasion"
    capability: "绕过 Android 非 SDK 接口（hidden-api）限制"
    dex_prefixes:
      - "org.lsposed.hiddenapibypass"
    note: "LSPosed 系 hidden-api 绕过；反射调用系统隐藏接口，常与 hook/反检测配套出现。"

  - name: "Native Binder 签名自校验/反重打包（SignCheck 或同类壳）"
    category: "evasion"
    capability: "native 手写 Parcel 直调 Binder IPC 取 APK 签名做重打包自校验，绕过 Java PackageManager 与签名 spoof 探针；常伴反 frida/hook/多开检测"
    so_names:
      - "libSignVerify.so"
    dex_prefixes:
      - "littlewhitebear.signverification"
    so_strings:
      - "android.content.pm.IPackageManager"
      - "android.os.IServiceManager"
    so_strings_all: true
    anti_frida: true
    note: "★ 反重打包：走 Binder IPC 底层取签名，fxapk repackage 重签会被其自校验识破、签名 spoof 探针(Java hook)打不到——需保留原签名或退旁路 pcap。libSignVerify.so/littlewhitebear 命中=具体工具 SignCheck；仅 so_strings 命中(同一 .so 内 IPackageManager+IServiceManager 双 native 字面量)=该**技术**指纹——商业加固/完整性校验壳(jiagu/legu/梆梆类)也用同技术,故用技术级命名、串案时按弱锚点(同技术≠同工具/同团伙)对待。"

  - name: "InjectDetect (frida/xposed 反注入检测器)"
    category: "evasion"
    capability: "运行时探测 frida/xposed 注入（扫 /proc maps·smaps·task + 内存段 + linker 敏感库 + CRC 完整性），命中令 App 退出"
    so_names:
      - "libcheck_env.so"
    dex_prefixes:
      - "com.yuuki.check_env"
    so_strings:
      - "detect lib has bean hooked"
    anti_frida: true
    note: "检测类而非逃逸类；命中即预判 frida attach 会被识别→秒退/零产出——frida 秒退应归因『被 detect』而非『样本干净』，需旁路 pcap/tls-keylog/内核抓包。so 名/包名可被改名规避，抗改名指纹=.so 内特征串（含原作拼写错 bean≠been）。"

  - name: "Xposed/LSPosed 模块身份"
    category: "evasion"
    capability: "本 APK 声明为 Xposed/LSPosed 模块 = 设计用于 hook 其它 app（远控/劫持/改包前置）"
    files:
      - "assets/xposed_init"
    note: "★ 正常终端 app 绝不会把自己做成 Xposed 模块；内置 assets/xposed_init = 本包用于 hook 别的 app，强异常信号（远控/虚拟摄像头刷脸/改包类黑产工具常见）。注：仅用 manifest meta-data(xposedmodule) 声明、无 assets/xposed_init 的现代 LSPosed 模块由 manifest 分析器另行覆盖；未加 de.robv.android.xposed 作 dex 前缀，因正规银行/支付 app 也内嵌该串做反 Xposed 检测会误报。"

  - name: "虚拟摄像头/刷脸绕过 (CamSwap 系)"
    category: "evasion"
    capability: "注入假视频流冒充摄像头 → 绕过人脸活体检测 / KYC 刷脸（实名认证/开户/解冻）"
    files:
      - "cs_config.json"
    dex_prefixes:
      - "camswap"
    note: "★★ 高涉诈价值：具备『冒用他人人脸过活体检测』能力，是绕过实名认证、盗开账户、过 KYC 洗白的核心黑产环节；调证指向被绕过的实名核验平台/人脸服务商（取绕过时间戳+被冒用身份）。签名为 CamSwap 系工具特征、best-effort（真实包名可能定制），配合上面 Xposed 模块身份共现更可信。"

  - name: "Frida Gadget (内嵌 frida)"
    category: "instrumentation"
    capability: "样本内嵌 frida gadget（自我插桩/注入）"
    so_names:
      - "libgadget.so"
      - "libfrida-gadget.so"
    files:
      - "frida-gadget"
      - "libfrida-gadget.config.so"
    note: "样本自身内嵌 frida gadget = 具备运行时自我插桩/注入能力（疑用于劫持其它 app 或动态改包），强异常信号。"
